# ApplicationSet with inline manifests for testing
# This doesn't require a Git repository
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rto-rpo-test-inline
  namespace: argocd
spec:
  generators:
  - clusterDecisionResource:
      configMapRef: acm-placement
      labelSelector:
        matchLabels:
          cluster.open-cluster-management.io/placement: rto-rpo-test-placement
      requeueAfterSeconds: 10

  template:
    metadata:
      name: 'rto-rpo-test-{{name}}'
      namespace: argocd
    spec:
      project: dr-apps
      source:
        repoURL: https://github.com/argoproj/argocd-example-apps.git
        targetRevision: HEAD
        path: "."
        plugin:
          name: ""
      destination:
        server: '{{server}}'
        namespace: ramen-test
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
---
# Alternative: Use a ConfigMap + Plugin approach
# This ApplicationSet uses the raw Kubernetes manifests directly
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rto-rpo-test-raw
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - clusterDecisionResource:
      configMapRef: acm-placement
      labelSelector:
        matchLabels:
          cluster.open-cluster-management.io/placement: rto-rpo-test-placement
      requeueAfterSeconds: 10

  template:
    metadata:
      name: 'rto-rpo-test-{{ .name }}'
      namespace: argocd
      finalizers:
      - resources-finalizer.argocd.argoproj.io
    spec:
      project: dr-apps
      sources:
      - repoURL: https://github.com/dstanley/ramen-ots.git
        targetRevision: main
        path: examples/rke2/test-app
        directory:
          recurse: false
          # PVC excluded - Ramen manages PVC lifecycle during DR operations
          include: '{namespace.yaml,configmap.yaml,deployment.yaml}'
      destination:
        server: '{{ .server }}'
        namespace: ramen-test
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - PruneLast=true
        - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
