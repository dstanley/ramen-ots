# RamenConfig for DR Cluster operator on RKE2 clusters
# Deploy this configuration on each managed RKE2 cluster
apiVersion: ramendr.openshift.io/v1alpha1
kind: RamenConfig
health:
  healthProbeBindAddress: :8081
metrics:
  bindAddress: 127.0.0.1:9289
webhook:
  port: 9443
leaderElection:
  leaderElect: true
  resourceName: dr-cluster.ramendr.openshift.io
ramenControllerType: "dr-cluster"
maxConcurrentReconciles: 50

# VolSync configuration for Longhorn-based replication
# Note: cephFSCSIDriverName is not needed for Longhorn
volSync:
  destinationCopyMethod: "Snapshot"

# Kube object protection via Velero
kubeObjectProtection:
  veleroNamespaceName: "velero"

# S3 store profiles for backup storage
s3StoreProfiles:
  - s3ProfileName: "minio-on-hub"
    s3Bucket: "ramen"
    s3CompatibleEndpoint: "http://minio.minio-system.svc.cluster.local:9000"
    s3Region: "us-east-1"
    s3SecretRef:
      name: "s3-secret"
      namespace: "ramen-system"
