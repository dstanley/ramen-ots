apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramen-ots-controller
  namespace: ramen-ots-system
  labels:
    app: ramen-ots-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ramen-ots-controller
  template:
    metadata:
      labels:
        app: ramen-ots-controller
    spec:
      serviceAccountName: ramen-ots-controller
      containers:
        - name: controller
          image: registry.192.168.7.68.nip.io/ramen-ots:latest
          imagePullPolicy: IfNotPresent
          args:
            - --namespace=ramen-ots-system
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
