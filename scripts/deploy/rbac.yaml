apiVersion: v1
kind: ServiceAccount
metadata:
  name: ramen-ots-controller
  namespace: ramen-ots-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ramen-ots-controller
rules:
  # ManifestWork - full access for reconciliation
  - apiGroups: ["work.open-cluster-management.io"]
    resources: ["manifestworks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["work.open-cluster-management.io"]
    resources: ["manifestworks/status"]
    verbs: ["get", "update", "patch"]
  # ManagedClusterView - full access for reconciliation
  - apiGroups: ["view.open-cluster-management.io"]
    resources: ["managedclusterviews"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["view.open-cluster-management.io"]
    resources: ["managedclusterviews/status"]
    verbs: ["get", "update", "patch"]
  # Secrets - read kubeconfig secrets, update for finalizers on hub secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "update"]
  # DRPolicy - read target clusters for secret propagation
  - apiGroups: ["ramendr.openshift.io"]
    resources: ["drpolicies"]
    verbs: ["get", "list", "watch"]
  # PlacementDecision - watch for Fleet label sync
  - apiGroups: ["cluster.open-cluster-management.io"]
    resources: ["placementdecisions"]
    verbs: ["get", "list", "watch"]
  # Fleet Clusters - label management for DR targeting
  - apiGroups: ["fleet.cattle.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ramen-ots-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ramen-ots-controller
subjects:
  - kind: ServiceAccount
    name: ramen-ots-controller
    namespace: ramen-ots-system
